<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" shape-rendering="crispEdges" aria-label="Hello!">
  <!-- ================ CYAN PIXEL BORDER ================ -->
  <g fill="#13B9FD">
    <!-- Top edge: stepped corners -->
    <rect x="2" y="0" width="46" height="2"/>
    <rect x="1" y="2" width="48" height="2"/>
    <!-- Left side -->
    <rect x="0" y="4" width="2" height="14"/>
    <!-- Right side -->
    <rect x="48" y="4" width="2" height="14"/>
    <!-- Bottom inner row (split for tail) -->
    <rect x="1" y="18" width="32" height="2"/>
    <rect x="40" y="18" width="8" height="2"/>
    <!-- Bottom outer row (split for tail) -->
    <rect x="2" y="20" width="30" height="2"/>
    <rect x="40" y="20" width="6" height="2"/>
    <!-- TAIL stepping down-right -->
    <rect x="33" y="20" width="7" height="2"/>
    <rect x="34" y="22" width="6" height="2"/>
    <rect x="35" y="24" width="5" height="2"/>
    <rect x="36" y="26" width="4" height="2"/>
    <rect x="37" y="28" width="3" height="2"/>
    <rect x="38" y="30" width="2" height="2"/>
  </g>

  <!-- ================ WHITE INTERIOR ================ -->
  <g fill="#FFFFFF">
    <rect x="2" y="2" width="46" height="2"/>
    <rect x="2" y="4" width="46" height="14"/>
    <rect x="2" y="18" width="30" height="2"/>
    <rect x="40" y="18" width="6" height="2"/>
    <!-- Inside tail -->
    <rect x="34" y="20" width="6" height="2"/>
    <rect x="35" y="22" width="5" height="2"/>
    <rect x="36" y="24" width="4" height="2"/>
    <rect x="37" y="26" width="3" height="2"/>
    <rect x="38" y="28" width="2" height="2"/>
  </g>

  <!-- ================ HELLO TEXT (pixel art) ================ -->
  <g fill="#1A1A1A">
    <!-- H -->
    <rect x="11" y="6" width="1" height="10"/>
    <rect x="15" y="6" width="1" height="10"/>
    <rect x="12" y="10" width="3" height="2"/>
    <!-- E -->
    <rect x="17" y="6" width="1" height="10"/>
    <rect x="18" y="6" width="3" height="2"/>
    <rect x="18" y="10" width="2" height="2"/>
    <rect x="18" y="14" width="3" height="2"/>
    <!-- L -->
    <rect x="23" y="6" width="1" height="10"/>
    <rect x="24" y="14" width="3" height="2"/>
    <!-- L -->
    <rect x="29" y="6" width="1" height="10"/>
    <rect x="30" y="14" width="3" height="2"/>
    <!-- O -->
    <rect x="35" y="6" width="1" height="10"/>
    <rect x="39" y="6" width="1" height="10"/>
    <rect x="36" y="6" width="3" height="2"/>
    <rect x="36" y="14" width="3" height="2"/>
  </g>
</svg>
